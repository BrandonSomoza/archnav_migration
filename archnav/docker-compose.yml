version: '3.3'

services:
  apacheds:
    build: ./apacheds
    image: archnav-apacheds
    container_name: apacheds
    ports:
      - "10389:10389"
    volumes:
      - apacheds-data:/var/lib/apacheds-2.0.0.AM25

  fortress:
    build: ./fortress
    image: archnav-fortress
    container_name: fortress
    ports:
      - "8080:8080"
    depends_on:
      - apacheds

  glassfish:
    build: ./glassfish
    image: archnav-glassfish
    container_name: glassfish
    ports:
      - "9999:8080"
      - "4848:4848"
    depends_on:
      - apacheds
      - fortress

volumes:
  apacheds-data:
